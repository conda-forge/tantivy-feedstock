{% set name = "tantivy" %}
{% set version = "0.24.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/tantivy-{{ version }}.tar.gz
  sha256: 70085830512501dc8104f4d7ae68c7b8f7a2c1d489fbfc6fe411184d5803710a

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  skip: true  # [py>=313]

requirements:
  build:
    - {{ compiler("c") }}
    - {{ stdlib("c") }}
    - {{ compiler("rust") }}
    - cargo-bundle-licenses
    - pkg-config
  host:
    - python
    - maturin <=1.3.2
    - pip
  run:
    - python

test:
  imports:
    - tantivy
  commands:
    - pip check
  requires:
    - pip

about:
  summary: Python bindings for Tantivy
  home: https://github.com/quickwit-oss/tantivy-py
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
